    --card-radius:14px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-1:#1a1a19; --page:#0d0d0d; --text-primary:#ffffff; --text-secondary:#c3c2b7;

      --success:#0ca30c;
      --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767; --s7:#d55181; --s8:#d95926;
      --seq-100:#184f95; --seq-450:#3987e5; --seq-650:#cde2fb;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0; background:var(--page); color:var(--text-primary);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;padding:16px 14px 60px;}
  header{padding:6px 2px 14px;}
  h1{font-size:20px;margin:0 0 4px;font-weight:700;}
  .sub{font-size:12.5px;color:var(--text-secondary);}
  .statusbar{
    display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
    margin-top:10px; font-size:12px; color:var(--muted);
  }
  .statusbar .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
  .dot.live{background:var(--good);}
  .dot.stale{background:var(--warning);}
  .dot.err{background:var(--critical);}
  #refreshBtn{
    border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);
    border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer;
  }
  #refreshBtn:active{opacity:0.7;}

  .filters{
    display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 18px; align-items:center;
  }
  .seg{display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  .seg button{
    border:none; background:var(--surface-1); color:var(--text-secondary); padding:8px 14px;
    font-size:13px; cursor:pointer;
  }
  .seg button.active{background:var(--s1); color:#fff; font-weight:600;}
  select{
    border:1px solid var(--border); border-radius:10px; background:var(--surface-1); color:var(--text-primary);
    padding:7px 10px; font-size:13px;
  }

  .kpi-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:20px;
  }
  .kpi{
    background:var(--surface-1); border:1px solid var(--border); border-radius:var(--card-radius);
    padding:14px 14px 12px;
  }
  .kpi .label{font-size:11.5px; color:var(--muted); margin-bottom:6px;}
  .kpi .value{font-size:22px; font-weight:700; letter-spacing:-0.02em; font-variant-numeric:tabular-nums;}
  .kpi .value small{font-size:13px; font-weight:600; color:var(--text-secondary);}

  section{
    background:var(--surface-1); border:1px solid var(--border); border-radius:var(--card-radius);
    padding:16px 16px 14px; margin-bottom:16px;
  }
  section h2{font-size:14.5px; margin:0 0 12px; font-weight:700;}
  section h2 .hint{font-size:11.5px; font-weight:400; color:var(--muted); margin-left:6px;}

  .barlist{display:flex; flex-direction:column; gap:10px;}
  .barrow{display:flex; align-items:center; gap:10px; font-size:12.5px;}
  .barrow .name{width:70px; flex-shrink:0; color:var(--text-secondary); font-weight:600;}
  .barrow .track{flex:1; background:var(--grid); border-radius:5px; height:20px; position:relative; overflow:hidden;}
  .barrow .fill{height:100%; border-radius:5px; min-width:3px;}
  .barrow .val{width:96px; text-align:right; flex-shrink:0; font-variant-numeric:tabular-nums; color:var(--text-primary);}

  .chartwrap{position:relative;}
  svg.trend{width:100%; height:180px; display:block; touch-action:none;}
  .tooltip{
    position:absolute; pointer-events:none; background:var(--text-primary); color:var(--surface-1);
    font-size:11.5px; padding:5px 8px; border-radius:6px; transform:translate(-50%,-115%);
    white-space:nowrap; opacity:0; transition:opacity .1s; z-index:5; font-variant-numeric:tabular-nums;
  }

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .tblscroll{overflow-x:auto; margin:0 -2px;}
  th,td{padding:8px 9px; text-align:right; white-space:nowrap; border-bottom:1px solid var(--grid);}
  th:first-child,td:first-child{text-align:left; position:sticky; left:0; background:var(--surface-1);}
  th{color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.02em;}
  td{font-variant-numeric:tabular-nums;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block; padding:2px 7px; border-radius:20px; font-size:11px; font-weight:600;}
  .badge.good{background:rgba(12,163,12,.13); color:var(--good);}
  .badge.warn{background:rgba(250,178,25,.18); color:#9a6400;}
  .badge.bad{background:rgba(208,59,59,.14); color:var(--critical);}
  @media (prefers-color-scheme: dark){
    .badge.warn{color:var(--warning);}
  }

  .legend{display:flex; flex-wrap:wrap; gap:10px 14px; margin-top:10px; font-size:11.5px; color:var(--text-secondary);}
  .legend .item{display:flex; align-items:center; gap:5px;}
  .legend .sw{width:9px;height:9px;border-radius:2px;}

  footer{text-align:center; font-size:11px; color:var(--muted); padding:18px 8px 0;}
  .errbox{
    background:rgba(208,59,59,.1); border:1px solid var(--critical); color:var(--critical);
    border-radius:10px; padding:10px 12px; font-size:12.5px; margin-bottom:16px; display:none;
  }
  .empty{color:var(--muted); font-size:12.5px; text-align:center; padding:20px 0;}
</style>

    </div>
  </section>

        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <footer>

  </footer>
</div>

      // gid uniquely identifies the tab and survives renaming/reordering; more
      // reliable than matching by sheet name (which can silently fall back to
      // the first tab if the emoji/name doesn't match exactly).
      var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
                 "/gviz/tq?tqx=out:json;responseHandler:" + cbName +
                 "&gid=" + encodeURIComponent(gid) +
                 "&headers=0" + // disable gviz's automatic header-row detection: without this,
                                 // Google may silently strip 1-2 rows out of table.rows into
                                 // table.cols[].label instead, which is what was actually causing
                                 // "未解析到任何数据行" — our parser expects every row (including
                                 // the title/header rows) to be present in table.rows.
                 "&_=" + Date.now();
      var script = document.createElement("script");
      script.src = url;
      script.onerror = function(){ cleanup(); reject(new Error("网络请求失败")); };
      document.head.appendChild(script);
    });
  }

  function parseGvizDate(v){
    if (typeof v === "string" && v.indexOf("Date(") === 0){
      var m = v.match(/Date\((\d+),(\d+),(\d+)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
    }
    return null;
  }

  // Columns are located by matching header text keywords rather than fixed
  // positions, so inserting/reordering/renaming a column in the sheet (e.g. a
  // new "星期" helper column) doesn't silently break the dashboard. The date
  // column itself is located per-row by scanning for a cell whose value is a
  // gviz Date(...) literal, since header text for the date column has been
  // seen duplicated/ambiguous in practice.
  // For a column gviz infers as numeric, a text header cell sitting in that
  // column often comes back with v:null and the literal text only in f (the
  // formatted-value field) — v and the column's inferred type must agree, so
  // a string can't live in .v there. Always prefer a string .v, else fall
  // back to .f, so header lookups work for numeric-typed columns too.
  function cellText(cell){
    if (!cell) return null;
    if (typeof cell.v === "string") return cell.v;
    if (typeof cell.f === "string") return cell.f;
    return null;
  }

  function findHeaderRow(rows){
    for (var i = 0; i < rows.length; i++){
      var c = rows[i].c || [];
      for (var j = 0; j < c.length; j++){
        var v = cellText(c[j]);
        if (v && v.indexOf("店铺") >= 0) return i;
      }
    }
    return -1;
  }

  function buildColumnMap(headerCells){
    function findCol(rule){
      for (var j = 0; j < headerCells.length; j++){
        var v = cellText(headerCells[j]);
        if (v && rule(v)) return j;
      }
      return -1;
    }
    return {
      store:     findCol(function(s){ return s.indexOf("店铺") >= 0; }),
      visitors:  findCol(function(s){ return s.indexOf("访客") >= 0; }),
      pv:        findCol(function(s){ return s.indexOf("浏览量") >= 0; }),
      orders:    findCol(function(s){ return s.indexOf("订单数") >= 0 && s.indexOf("广告") < 0; }),
      gmv:       findCol(function(s){ return s.indexOf("总销售额") >= 0 || (s.indexOf("GMV") >= 0 && s.indexOf("广告") < 0); }),
      adSpend:   findCol(function(s){ return s.indexOf("广告花费") >= 0; }),
      adRevenue: findCol(function(s){ return s.indexOf("广告销售额") >= 0; }),
      newBuyers: findCol(function(s){ return s.indexOf("新买家") >= 0; }),
      cancelled: findCol(function(s){ return s.indexOf("取消订单") >= 0; }),
      returns:   findCol(function(s){ return s.indexOf("退货退款") >= 0; })
    };
  }

  function parseRecords(resp){
    var rows = (resp && resp.table && resp.table.rows) || [];
    var headerRowIdx = findHeaderRow(rows);
    var colMap, dataStartIdx;
    if (headerRowIdx >= 0){
      colMap = buildColumnMap(rows[headerRowIdx].c || []);
      dataStartIdx = headerRowIdx + 1;
    } else {
      // Fallback: if Google's gviz still stripped the header row(s) out into
      // table.cols despite &headers=0, build the column map from there and
      // treat every row in table.rows as a potential data row.
      var cols = (resp && resp.table && resp.table.cols) || [];
      var syntheticHeader = cols.map(function(col){ return { v: col.label || "" }; });
      colMap = buildColumnMap(syntheticHeader);
      dataStartIdx = 0;
    }
    if (colMap.store < 0) return []; // couldn't locate columns at all — bail cleanly

    var out = [];
    var started = false;
    for (var i = dataStartIdx; i < rows.length; i++){
      var c = rows[i].c || [];
      var d = null;
      for (var j = 0; j < c.length; j++){
        var candidate = c[j] ? parseGvizDate(c[j].v) : null;
        if (candidate){ d = candidate; break; }
      }
      if (!d){
        if (started) break; // hit trailing blank rows after data block
        continue; // still skipping any rows before the first real data row
      }
      started = true;
      var get = function(idx){ return (idx >= 0 && c[idx]) ? c[idx].v : null; };
      out.push({
        date: d,
        store: (get(colMap.store) || "").toString().trim() || "未命名店铺",
        visitors: num(get(colMap.visitors)),
        pv: num(get(colMap.pv)),
        orders: num(get(colMap.orders)),
        gmv: num(get(colMap.gmv)),
        adSpend: num(get(colMap.adSpend)),
        adRevenue: num(get(colMap.adRevenue)),
        newBuyers: num(get(colMap.newBuyers)),
        cancelled: num(get(colMap.cancelled)),
        returns: num(get(colMap.returns))
      });
    }
    return out;
  }

  // ---- Data loading ----
  function load(isManual){
    setStatus("loading");
    fetchSheet(SHEET_GID).then(function(resp){
      var records = parseRecords(resp);
      if (!records.length) throw new Error("未解析到任何数据行");
      state.records = records;
      state.live = true;
      populateFilters();
      render();
      setStatus("live");
      hideErr();
    }).catch(function(err){
      state.live = false;
      if (!state.year) { populateFilters(); render(); } // ensure something renders on first load even if offline
      setStatus("err");
      showErr("无法连接 Google Sheets 获取实时数据（" + err.message + "）。当前显示的是最近一次成功加载的数据快照。");
    });
  }

  function setStatus(kind){
    var dot = document.getElementById("statusDot");
    var text = document.getElementById("statusText");
    var now = new Date();
    var timeStr = now.toLocaleString("zh-CN", { hour12:false });
    if (kind === "loading"){
      dot.className = "dot stale"; text.innerHTML = '<span class="dot stale" id="statusDot"></span>正在加载最新数据…';
    } else if (kind === "live"){
      var diag = "";
      if (state.records.length){
        var dates = state.records.map(function(r){ return r.date; }).sort(function(a,b){ return a-b; });
        diag = "（共 " + state.records.length + " 条记录，" + fmtDate(dates[0]) + " 至 " + fmtDate(dates[dates.length-1]) + "）";
      }
      text.innerHTML = '<span class="dot live" id="statusDot"></span>实时数据 · 更新于 ' + timeStr + '<br><span style="font-size:10.5px;">' + diag + '</span>';
    } else {
      text.innerHTML = '<span class="dot err" id="statusDot"></span>离线快照 · 上次尝试 ' + timeStr;
    }
  }
  function showErr(msg){ var b = document.getElementById("errBox"); b.textContent = msg; b.style.display = "block"; }
  function hideErr(){ document.getElementById("errBox").style.display = "none"; }

  // ---- Filters ----
  function populateFilters(){
    var years = Array.from(new Set(state.records.map(function(r){ return r.date.getFullYear(); }))).sort(function(a,b){return b-a;});
    if (!years.length) years = [new Date().getFullYear()];
    var ySel = document.getElementById("yearSel");
    var prevYear = state.year;
    ySel.innerHTML = years.map(function(y){ return '<option value="'+y+'">'+y+' 年</option>'; }).join("");
    state.year = years.indexOf(prevYear) >= 0 ? prevYear : years[0];
    ySel.value = state.year;

    refreshMonthOptions();
    refreshStoreOptions();
  }

  function refreshStoreOptions(){
    var names = Array.from(new Set(state.records.map(function(r){ return r.store; }))).sort();
    var sSel = document.getElementById("storeSel");
    var prevStore = state.store;
    sSel.innerHTML = '<option value="all">🏬 全部店铺</option>' +
      names.map(function(n){ return '<option value="'+escapeHtml(n)+'">'+escapeHtml(n)+'</option>'; }).join("");
    state.store = (prevStore === "all" || names.indexOf(prevStore) >= 0) ? prevStore : "all";
    sSel.value = state.store;
  }

  function refreshMonthOptions(){
    var monthsInYear = Array.from(new Set(state.records.filter(function(r){ return r.date.getFullYear() === state.year; })
      .map(function(r){ return r.date.getMonth()+1; }))).sort(function(a,b){return b-a;});
    if (!monthsInYear.length) monthsInYear = [new Date().getMonth()+1];
    var mSel = document.getElementById("monthSel");
    var prevMonth = state.month;
    mSel.innerHTML = monthsInYear.map(function(m){ return '<option value="'+m+'">'+m+' 月</option>'; }).join("");
    state.month = monthsInYear.indexOf(prevMonth) >= 0 ? prevMonth : monthsInYear[0];
    mSel.value = state.month;
    mSel.disabled = state.mode === "year";

    refreshDayOptions();
  }

  function refreshDayOptions(){
    var daysInMonth = Array.from(new Set(state.records.filter(function(r){
      return r.date.getFullYear() === state.year && (r.date.getMonth()+1) === state.month;
    }).map(function(r){ return r.date.getDate(); }))).sort(function(a,b){return b-a;});
    if (!daysInMonth.length) daysInMonth = [new Date().getDate()];
    var dSel = document.getElementById("daySel");
    var prevDay = state.day;
    dSel.innerHTML = daysInMonth.map(function(d){ return '<option value="'+d+'">'+d+' 日</option>'; }).join("");
    state.day = daysInMonth.indexOf(prevDay) >= 0 ? prevDay : daysInMonth[0];
    dSel.value = state.day;
    dSel.disabled = state.mode !== "day";
  }

  function updateFilterEnablement(){
    document.getElementById("monthSel").disabled = state.mode === "year";
    document.getElementById("daySel").disabled = state.mode !== "day";
  }

  document.getElementById("modeSeg").addEventListener("click", function(e){
    var btn = e.target.closest("button"); if (!btn) return;
    state.mode = btn.dataset.mode;
    Array.from(this.children).forEach(function(b){ b.classList.toggle("active", b === btn); });
    updateFilterEnablement();
    render();
  });
  document.getElementById("yearSel").addEventListener("change", function(){
    state.year = +this.value; refreshMonthOptions(); render();
  });
  document.getElementById("monthSel").addEventListener("change", function(){
    state.month = +this.value; refreshDayOptions(); render();
  });
  document.getElementById("daySel").addEventListener("change", function(){
    state.day = +this.value; render();
  });
  document.getElementById("storeSel").addEventListener("change", function(){
    state.store = this.value; render();
  });
  document.getElementById("refreshBtn").addEventListener("click", function(){ load(true); });

  // ---- Store color assignment (stable, alphabetical order across full dataset) ----
  function assignStoreColors(){
    var names = Array.from(new Set(state.records.map(function(r){ return r.store; }))).sort();
    state.storeColor = {};
    names.forEach(function(n, i){ state.storeColor[n] = cssVar(PALETTE[i % PALETTE.length]); });
  }

  // ---- Aggregation ----
  function filteredRecords(){
    return state.records.filter(function(r){
      if (r.date.getFullYear() !== state.year) return false;
      if ((state.mode === "month" || state.mode === "day") && (r.date.getMonth()+1) !== state.month) return false;
      if (state.mode === "day" && r.date.getDate() !== state.day) return false;
      if (state.store !== "all" && r.store !== state.store) return false;
      return true;
    });
  }

  function aggregateByStore(records){
    var map = {};
    records.forEach(function(r){
      var s = map[r.store] || (map[r.store] = {store:r.store, visitors:0, pv:0, orders:0, gmv:0, adSpend:0, adRevenue:0, newBuyers:0, cancelled:0, returns:0});
      s.visitors += r.visitors; s.pv += r.pv; s.orders += r.orders; s.gmv += r.gmv;
      s.adSpend += r.adSpend; s.adRevenue += r.adRevenue; s.newBuyers += r.newBuyers;
      s.cancelled += r.cancelled; s.returns += r.returns;
    });
    return Object.values(map).map(function(s){
      s.aov = s.orders ? s.gmv / s.orders : 0;
      s.cvr = s.visitors ? s.orders / s.visitors : 0;
      s.roas = s.adSpend ? s.adRevenue / s.adSpend : 0;
      s.cancelRate = s.orders ? s.cancelled / s.orders : 0;
      s.returnRate = s.orders ? s.returns / s.orders : 0;
      return s;
    }).sort(function(a,b){ return b.gmv - a.gmv; });
  }

  function fmtMoney(n){ return "RM " + n.toLocaleString("en-MY", {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function fmtInt(n){ return Math.round(n).toLocaleString("en-MY"); }
  function fmtPct(n){ return (n*100).toFixed(2) + "%"; }
  function fmtX(n){ return n.toFixed(2) + "x"; }

  function rateBadge(rate, goodMax, warnMax){
    var cls = rate <= goodMax ? "good" : (rate <= warnMax ? "warn" : "bad");
    return '<span class="badge ' + cls + '">' + fmtPct(rate) + '</span>';
  }

  // ---- Render ----
  function render(){
    assignStoreColors();
    var records = filteredRecords();
    var stores = aggregateByStore(records);

    var totalGMV = stores.reduce(function(a,s){return a+s.gmv;},0);
    var totalOrders = stores.reduce(function(a,s){return a+s.orders;},0);
    var totalAdSpend = stores.reduce(function(a,s){return a+s.adSpend;},0);
    var totalAdRevenue = stores.reduce(function(a,s){return a+s.adRevenue;},0);
    var totalNewBuyers = stores.reduce(function(a,s){return a+s.newBuyers;},0);
    var overallROAS = totalAdSpend ? totalAdRevenue / totalAdSpend : 0;
    var activeStores = stores.filter(function(s){return s.orders>0;});
    var overallCVR = activeStores.length ? activeStores.reduce(function(a,s){return a+s.cvr;},0)/activeStores.length : 0;
    var overallCancel = activeStores.length ? activeStores.reduce(function(a,s){return a+s.cancelRate;},0)/activeStores.length : 0;
    var overallReturn = activeStores.length ? activeStores.reduce(function(a,s){return a+s.returnRate;},0)/activeStores.length : 0;

    renderKPI(totalGMV, totalOrders, overallROAS, totalNewBuyers, totalAdSpend, overallCVR, overallCancel, overallReturn);
    renderStoreBars(stores, totalGMV);
    renderStoreTable(stores);
    renderTrend(records);
    renderDailyTable(records.slice().sort(function(a,b){return b.date-a.date;}).slice(0,20));
  }

  function renderKPI(gmv, orders, roas, newBuyers, adSpend, cvr, cancel, ret){
    var items = [
      ["💰 总 GMV", fmtMoney(gmv)],
      ["📦 总订单数", fmtInt(orders)],
      ["🎯 平均 ROAS", fmtX(roas)],
      ["🧑 新买家数", fmtInt(newBuyers)],
      ["📢 广告花费", fmtMoney(adSpend)],
      ["📈 平均转化率", fmtPct(cvr)],
      ["↩️ 平均取消率", fmtPct(cancel)],
      ["📮 平均退货率", fmtPct(ret)]
    ];
    document.getElementById("kpiGrid").innerHTML = items.map(function(it){
      return '<div class="kpi"><div class="label">'+it[0]+'</div><div class="value">'+it[1]+'</div></div>';
    }).join("");
  }

  function renderStoreBars(stores, totalGMV){
    var maxGMV = Math.max.apply(null, stores.map(function(s){return s.gmv;}).concat([1]));
    var html = stores.map(function(s){
      var pct = totalGMV ? (s.gmv/totalGMV*100).toFixed(1) : "0.0";
      var w = Math.max((s.gmv/maxGMV*100), 1.5);
      return '<div class="barrow">' +
        '<div class="name">' + escapeHtml(s.store) + '</div>' +
        '<div class="track"><div class="fill" style="width:'+w+'%;background:'+state.storeColor[s.store]+'"></div></div>' +
        '<div class="val">'+fmtMoney(s.gmv)+' <span style="color:var(--muted)">('+pct+'%)</span></div>' +
      '</div>';
    }).join("");
    document.getElementById("storeBars").innerHTML = html || '<div class="empty">当前筛选范围内没有数据</div>';
  }

  function renderStoreTable(stores){
    var tbody = document.querySelector("#storeTable tbody");
    if (!stores.length){ tbody.innerHTML = '<tr><td colspan="10" class="empty">暂无数据</td></tr>'; return; }
    tbody.innerHTML = stores.map(function(s){
      return '<tr>' +
        '<td style="color:'+state.storeColor[s.store]+';font-weight:700;">'+escapeHtml(s.store)+'</td>' +
        '<td>'+fmtMoney(s.gmv)+'</td>' +
        '<td>'+fmtInt(s.orders)+'</td>' +
        '<td>'+fmtMoney(s.aov)+'</td>' +
        '<td>'+fmtPct(s.cvr)+'</td>' +
        '<td>'+fmtMoney(s.adSpend)+'</td>' +
        '<td>'+fmtX(s.roas)+'</td>' +
        '<td>'+fmtInt(s.newBuyers)+'</td>' +
        '<td>'+rateBadge(s.cancelRate, 0.05, 0.15)+'</td>' +
        '<td>'+rateBadge(s.returnRate, 0.02, 0.08)+'</td>' +
      '</tr>';
    }).join("");
  }

  function renderDailyTable(records){
    var tbody = document.querySelector("#dailyTable tbody");
    if (!records.length){ tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无数据</td></tr>'; return; }
    tbody.innerHTML = records.map(function(r){
      var roas = r.adSpend ? (r.adRevenue/r.adSpend) : 0;
      return '<tr>' +
        '<td>'+fmtDate(r.date)+'</td>' +
        '<td style="color:'+state.storeColor[r.store]+';font-weight:700;">'+escapeHtml(r.store)+'</td>' +
        '<td>'+fmtInt(r.visitors)+'</td>' +
        '<td>'+fmtInt(r.orders)+'</td>' +
        '<td>'+fmtMoney(r.gmv)+'</td>' +
        '<td>'+fmtMoney(r.adSpend)+'</td>' +
        '<td>'+(r.adSpend? fmtX(roas) : "—")+'</td>' +
        '<td>'+fmtInt(r.newBuyers)+'</td>' +
      '</tr>';
    }).join("");
  }

  function fmtDate(d){
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  // ---- Trend chart (bar chart, single sequential hue, with tooltip) ----
  function renderTrend(records){
    var titleEl = document.getElementById("trendTitle");
    var buckets, labelFn;
    if (state.mode === "day"){
      titleEl.innerHTML = "当日各店铺 GMV <span class='hint'>" + state.year + "-" + String(state.month).padStart(2,"0") + "-" + String(state.day).padStart(2,"0") + "</span>";
      var byStore = {};
      records.forEach(function(r){ byStore[r.store] = (byStore[r.store]||0) + r.gmv; });
      buckets = Object.keys(byStore).sort(function(a,b){ return byStore[b]-byStore[a]; })
        .map(function(k){ return {label:k, full:k, value:byStore[k]}; });
    } else if (state.mode === "month"){
      titleEl.innerHTML = "每日 GMV 趋势 <span class='hint'>" + state.year + " 年 " + state.month + " 月</span>";
      var byDay = {};
      records.forEach(function(r){ var k = fmtDate(r.date); byDay[k] = (byDay[k]||0) + r.gmv; });
      var days = Object.keys(byDay).sort();
      buckets = days.map(function(k){ return {label:k.slice(5), full:k, value:byDay[k]}; });
    } else {
      titleEl.innerHTML = "月度 GMV 趋势 <span class='hint'>" + state.year + " 年全年</span>";
      var byMonth = {};
      records.forEach(function(r){ var k = r.date.getMonth()+1; byMonth[k] = (byMonth[k]||0) + r.gmv; });
      buckets = [];
      for (var m=1;m<=12;m++){ if (byMonth[m] !== undefined) buckets.push({label:m+"月", full:state.year+"-"+String(m).padStart(2,"0"), value:byMonth[m]}); }
    }
    drawBarSVG("trendSvg", "trendTooltip", buckets);
  }

  function drawBarSVG(svgId, tooltipId, buckets){
    var svg = document.getElementById(svgId);
    var tooltip = document.getElementById(tooltipId);
    var W = svg.clientWidth || 600, H = 180;
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.innerHTML = "";
    if (!buckets.length){
      svg.innerHTML = '<text x="'+(W/2)+'" y="'+(H/2)+'" text-anchor="middle" fill="var(--muted)" font-size="12">暂无数据</text>';
      return;
    }
    var padL = 4, padR = 4, padT = 10, padB = 22;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxV = Math.max.apply(null, buckets.map(function(b){return b.value;}).concat([1]));
    var n = buckets.length;
    var gap = Math.min(10, plotW / n * 0.3);
    var bw = (plotW - gap*(n-1)) / n;
    var seqColor = cssVar("--seq-450");
    var ns = "http://www.w3.org/2000/svg";

    // gridline baseline
    var base = document.createElementNS(ns, "line");
    base.setAttribute("x1", padL); base.setAttribute("x2", W-padR);
    base.setAttribute("y1", H-padB); base.setAttribute("y2", H-padB);
    base.setAttribute("stroke", "var(--baseline)"); base.setAttribute("stroke-width", "1");
    svg.appendChild(base);

    buckets.forEach(function(b, i){
      var x = padL + i*(bw+gap);
      var h = maxV > 0 ? (b.value / maxV) * plotH : 0;
      var y = padT + (plotH - h);
      var rect = document.createElementNS(ns, "rect");
      rect.setAttribute("x", x); rect.setAttribute("y", y);
      rect.setAttribute("width", Math.max(bw,2)); rect.setAttribute("height", Math.max(h,1));
      rect.setAttribute("rx", Math.min(4, bw/2));
      rect.setAttribute("fill", seqColor);
      rect.style.cursor = "pointer";
      svg.appendChild(rect);

      var hit = document.createElementNS(ns, "rect");
      hit.setAttribute("x", x); hit.setAttribute("y", padT);
      hit.setAttribute("width", Math.max(bw,2)); hit.setAttribute("height", plotH+padB);
      hit.setAttribute("fill", "transparent");
      hit.addEventListener("mouseenter", function(){ showTip(b, x + bw/2, y); });
      hit.addEventListener("mousemove", function(){ showTip(b, x + bw/2, y); });
      hit.addEventListener("mouseleave", hideTip);
      hit.addEventListener("touchstart", function(ev){ ev.preventDefault(); showTip(b, x + bw/2, y); }, {passive:false});
      svg.appendChild(hit);

      if (n <= 14 || i % Math.ceil(n/10) === 0){
        var txt = document.createElementNS(ns, "text");
        txt.setAttribute("x", x + bw/2); txt.setAttribute("y", H-6);
        txt.setAttribute("text-anchor", "middle"); txt.setAttribute("font-size", "9.5");
        txt.setAttribute("fill", "var(--muted)");
        txt.textContent = b.label;
        svg.appendChild(txt);
      }
    });

    function showTip(b, x, y){
      tooltip.style.opacity = "1";
      tooltip.style.left = x + "px";
      tooltip.style.top = y + "px";
      tooltip.innerHTML = "<strong>" + b.full + "</strong><br>" + fmtMoney(b.value);
    }
    function hideTip(){ tooltip.style.opacity = "0"; }
  }

  window.addEventListener("resize", function(){ if (state.year) render(); });

  // init
  populateFilters();
  render();
  load(false);
  setInterval(function(){ load(false); }, REFRESH_MS);
})();
</script>
</body>
</html>
